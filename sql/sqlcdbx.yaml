version: 2
sql:         #This section defines the settings for processing SQL queries.
  - engine: "postgresql"
    schema: "./migrations/"   #the path to the directory containing the database migration files. sqlc uses these files to understand the database schema.
    queries: "./queries/" # the path to the directory containing the SQL query files (.sql). sqlc analyzes these queries to generate the Go code.
    gen:                   #This section defines the settings for code generation.
      go:
        # The Go package name for the generated code.
        package: "myproject_sqlc"
        # The output directory for the generated Go code.
        out: "../sqlcout"
        # The filename for the generated Go structs representing database tables.
        output_models_file_name: "models.go"
        # Generate an interface that defines methods for executing SQL queries. Improves testability.
        emit_interface: true
        # Add `db` tags to Go struct fields to match database column names.
        emit_db_tags: true
        # Do not use exact table names for Go struct names; use Go-style names instead (e.g., user_profiles -> UserProfiles).
        emit_exact_table_names: false
        # Use the pgx/v5 package for interacting with PostgreSQL.
        sql_package: "pgx/v5"
        # Do not generate methods that accept a *sql.DB or *pgxpool.Pool argument.
        emit_methods_with_db_argument: false
        # Generate exported (public) functions for executing SQL queries.
        emit_exported_queries: true
